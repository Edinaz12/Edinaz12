<svg width="460" height="150" viewBox="0 0 460 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dotglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- card -->
  <rect x="10" y="10" width="440" height="130" rx="18" fill="#0a0a0a" stroke="#1d1d1d" stroke-width="1.5"/>

  <!-- terminal traffic lights -->
  <circle cx="46" cy="42" r="6" fill="#ff5f57"/>
  <circle cx="68" cy="42" r="6" fill="#febc2e"/>
  <circle cx="90" cy="42" r="6" fill="#28c840"/>

  <!-- status -->
  <circle cx="356" cy="38" r="5" fill="#28c840" filter="url(#dotglow)">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="368" y="43" font-family="'Courier New', monospace" font-size="13" fill="#6b6b6b">online</text>

  <!-- wordmark -->
  <text x="230" y="102" text-anchor="middle" font-family="'Courier New', monospace" font-size="50" font-weight="700">
    <tspan fill="#ffffff">ezn</tspan><tspan fill="#727272"> .sys</tspan>
  </text>
</svg>
